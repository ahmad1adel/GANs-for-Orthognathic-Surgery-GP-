<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orthognathic Surgery — GAN Prediction</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    header p {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    /* ── Upload zone ── */
    .upload-zone {
      width: 100%;
      max-width: 520px;
      border: 2px dashed #334155;
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #1e2433;
      margin-bottom: 24px;
    }

    .upload-zone.drag-over {
      border-color: #60a5fa;
      background: #1e3050;
    }

    .upload-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .upload-zone h2 {
      font-size: 1.1rem;
      margin-bottom: 6px;
      color: #cbd5e1;
    }

    .upload-zone p {
      font-size: 0.85rem;
      color: #64748b;
    }

    #fileInput { display: none; }

    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 28px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: linear-gradient(135deg, #3b82f6, #7c3aed); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid #334155; color: #94a3b8; margin-left: 8px; }

    /* ── Preview ── */
    #preview-box {
      display: none;
      width: 100%;
      max-width: 520px;
      background: #1e2433;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: center;
    }

    #preview-box img {
      max-height: 220px;
      border-radius: 8px;
      object-fit: contain;
    }

    #preview-box p {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 8px;
    }

    /* ── Actions ── */
    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 36px;
    }

    /* ── Spinner ── */
    #spinner {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .ring {
      width: 52px; height: 52px;
      border: 4px solid #334155;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ── */
    #results {
      display: none;
      width: 100%;
      max-width: 860px;
    }

    #results h2 {
      text-align: center;
      font-size: 1.25rem;
      margin-bottom: 24px;
      color: #e2e8f0;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 60px 1fr;
      gap: 16px;
      align-items: center;
    }

    .result-card {
      background: #1e2433;
      border-radius: 14px;
      overflow: hidden;
      text-align: center;
    }

    .result-card .label {
      padding: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .before .label { background: #1e3a5f; color: #60a5fa; }
    .after  .label { background: #2d1b4e; color: #a78bfa; }

    .result-card img {
      width: 100%;
      display: block;
      object-fit: contain;
      background: #0f1117;
    }

    .arrow {
      text-align: center;
      font-size: 2rem;
      color: #475569;
    }

    /* ── Download ── */
    .download-wrap {
      text-align: center;
      margin-top: 24px;
    }

    /* ── Error ── */
    #error-box {
      display: none;
      max-width: 520px;
      background: #3b1e1e;
      border: 1px solid #7f1d1d;
      border-radius: 10px;
      padding: 14px 20px;
      color: #fca5a5;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>Orthognathic Surgery Prediction</h1>
  <p>Upload a <strong>before surgery</strong> face image — the GAN generates the predicted <strong>after surgery</strong> result.</p>
</header>

<!-- Upload zone -->
<div class="upload-zone" id="uploadZone">
  <div class="upload-icon">🖼️</div>
  <h2>Drag & drop your image here</h2>
  <p>or click to browse — PNG, JPG, BMP supported</p>
  <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.bmp,.tiff" />
</div>

<!-- Preview -->
<div id="preview-box">
  <img id="previewImg" src="" alt="Preview" />
  <p id="previewName"></p>
</div>

<!-- Action buttons -->
<div class="actions">
  <button class="btn btn-primary" id="predictBtn" disabled>Generate After Image</button>
  <button class="btn btn-outline"  id="resetBtn">Reset</button>
</div>

<!-- Spinner -->
<div id="spinner">
  <div class="ring"></div>
  <span style="color:#64748b;font-size:0.9rem;">Running GAN inference…</span>
</div>

<!-- Error -->
<div id="error-box" id="errorBox"></div>

<!-- Results -->
<div id="results">
  <h2>Result</h2>
  <div class="result-grid">
    <div class="result-card before">
      <div class="label">Before Surgery</div>
      <img id="beforeImg" src="" alt="Before" />
    </div>
    <div class="arrow">→</div>
    <div class="result-card after">
      <div class="label">After Surgery (Generated)</div>
      <img id="afterImg" src="" alt="After" />
    </div>
  </div>
  <div class="download-wrap">
    <a id="downloadBtn" class="btn btn-primary" download="generated_after.png">⬇ Download Result</a>
  </div>
</div>

<script>
  const uploadZone  = document.getElementById('uploadZone');
  const fileInput   = document.getElementById('fileInput');
  const previewBox  = document.getElementById('preview-box');
  const previewImg  = document.getElementById('previewImg');
  const previewName = document.getElementById('previewName');
  const predictBtn  = document.getElementById('predictBtn');
  const resetBtn    = document.getElementById('resetBtn');
  const spinner     = document.getElementById('spinner');
  const results     = document.getElementById('results');
  const errorBox    = document.getElementById('error-box');
  const beforeImg   = document.getElementById('beforeImg');
  const afterImg    = document.getElementById('afterImg');
  const downloadBtn = document.getElementById('downloadBtn');

  let selectedFile = null;

  // ── Click to open file picker ──────────────────────────────────────────────
  uploadZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

  // ── Drag & drop ────────────────────────────────────────────────────────────
  uploadZone.addEventListener('dragover', e => {
    e.preventDefault();
    uploadZone.classList.add('drag-over');
  });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    if (!file) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = ev => {
      previewImg.src   = ev.target.result;
      previewName.textContent = file.name + ' — ' + (file.size / 1024).toFixed(1) + ' KB';
      previewBox.style.display = 'block';
    };
    reader.readAsDataURL(file);
    predictBtn.disabled = false;
    results.style.display = 'none';
    errorBox.style.display = 'none';
  }

  // ── Predict ────────────────────────────────────────────────────────────────
  predictBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    spinner.style.display     = 'flex';
    results.style.display     = 'none';
    errorBox.style.display    = 'none';
    predictBtn.disabled       = true;

    const formData = new FormData();
    formData.append('image', selectedFile);

    try {
      const res  = await fetch('/predict', { method: 'POST', body: formData });
      const data = await res.json();

      if (!res.ok || data.error) {
        throw new Error(data.error || 'Server error');
      }

      beforeImg.src    = 'data:image/png;base64,' + data.before;
      afterImg.src     = 'data:image/png;base64,' + data.after;
      downloadBtn.href = 'data:image/png;base64,' + data.after;

      results.style.display = 'block';

    } catch (err) {
      errorBox.textContent    = '❌ ' + err.message;
      errorBox.style.display  = 'block';
    } finally {
      spinner.style.display  = 'none';
      predictBtn.disabled    = false;
    }
  });

  // ── Reset ──────────────────────────────────────────────────────────────────
  resetBtn.addEventListener('click', () => {
    selectedFile              = null;
    fileInput.value           = '';
    previewBox.style.display  = 'none';
    results.style.display     = 'none';
    errorBox.style.display    = 'none';
    predictBtn.disabled       = true;
  });
</script>
</body>
</html>
